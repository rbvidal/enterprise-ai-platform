services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docintel-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: docintel
      POSTGRES_USER: docintel
      POSTGRES_PASSWORD: docintel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - docintel-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: docintel-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cognitera.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docintel-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: docintel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - docintel-network

volumes:
  postgres_data:
  qdrant_storage:

networks:
  docintel-network:
    driver: bridge
